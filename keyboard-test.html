<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>Bubble — tastatur runde 3 (ægte layout)</title>
<style>
  /* ══ SAMME LÅS SOM BUBBLE ══ */
  html { height:100vh; overflow:hidden; overscroll-behavior:none; background:#0E141C; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,system-ui,sans-serif;background:transparent;
    color:rgba(255,255,255,0.92);height:100vh;overflow:hidden}

  /* Skærm-container som Bubbles .screen */
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden}

  .topbar{flex-shrink:0;display:flex;align-items:center;gap:0.6rem;padding:0.7rem 0.9rem;
    background:rgba(20,22,28,0.95);border-bottom:1px solid rgba(255,255,255,0.08);
    padding-top:calc(0.7rem + env(safe-area-inset-top,0px))}
  .topbar h1{font-size:0.92rem;font-weight:800}
  .topbar .sub{font-size:0.66rem;color:rgba(207,230,247,0.55)}

  /* Variant-vælger */
  .picker{flex-shrink:0;display:flex;gap:0.3rem;padding:0.5rem 0.7rem;
    background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.07);
    overflow-x:auto;scrollbar-width:none}
  .picker::-webkit-scrollbar{display:none}
  .pbtn{flex-shrink:0;padding:0.45rem 0.75rem;font-size:0.72rem;font-weight:750;
    border-radius:99px;border:1px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.05);
    color:rgba(207,230,247,0.6);font-family:inherit}
  .pbtn.on{background:rgba(100,180,230,0.22);border-color:rgba(100,180,230,0.5);color:#fff}

  .status{flex-shrink:0;padding:0.45rem 0.9rem;font-size:0.7rem;
    background:#0A0D12;border-bottom:1px solid rgba(255,255,255,0.07);
    display:flex;justify-content:space-between;font-family:ui-monospace,monospace}
  .status .v{font-weight:800}
  .v.good{color:#4ADE80}.v.bad{color:#FF8A8A}

  .desc{flex-shrink:0;padding:0.5rem 0.9rem;font-size:0.72rem;line-height:1.5;
    color:rgba(207,230,247,0.65);background:rgba(100,180,230,0.06);
    border-bottom:1px solid rgba(100,180,230,0.15)}

  /* ══ SAMME SOM BUBBLES .chat-messages ══ */
  .messages{flex:1;padding:0.75rem;display:flex;flex-direction:column;gap:0.4rem;
    overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
  .messages.rev{flex-direction:column-reverse}
  .msg{max-width:78%;padding:0.5rem 0.7rem;border-radius:14px;font-size:0.82rem;
    background:rgba(255,255,255,0.07);align-self:flex-start;word-break:break-word}
  .msg.mine{background:rgba(100,180,230,0.2);align-self:flex-end}

  /* ══ SAMME SOM BUBBLES .chat-composer ══ */
  .composer{flex-shrink:0;border-top:0.5px solid rgba(255,255,255,0.08);
    background:rgba(20,22,28,0.95);padding:0.5rem 0.75rem calc(0.5rem + env(safe-area-inset-bottom,0px));
    z-index:10}
  .crow{display:flex;align-items:center;gap:0.45rem}
  .cinput{flex:1;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.12);
    border-radius:20px;padding:0.6rem 0.9rem;font-size:16px;color:#fff;outline:none;font-family:inherit}
  .cinput:focus{border-color:rgba(100,180,230,0.5)}
  .sbtn{width:40px;height:40px;border-radius:50%;background:rgba(100,180,230,0.25);
    border:1px solid rgba(100,180,230,0.45);color:#fff;font-size:1.05rem;font-weight:800;flex-shrink:0}
  .sbtn.is-sending{opacity:0.45;pointer-events:none}

  .verdict{position:fixed;left:50%;transform:translateX(-50%);bottom:5.5rem;z-index:60;
    padding:0.6rem 1.1rem;border-radius:99px;font-size:0.82rem;font-weight:850;
    opacity:0;transition:opacity 0.25s;pointer-events:none;white-space:nowrap;
    max-width:92vw;overflow:hidden;text-overflow:ellipsis}
  .verdict.show{opacity:1}
  .verdict.ok{background:#0F8A4F;color:#fff}
  .verdict.bad{background:#C0392B;color:#fff}
  .verdict.wait{background:#C98A00;color:#fff}
</style>
</head>
<body>
<div class="screen">

  <div class="topbar">
    <div>
      <h1>Tastatur-test · ægte layout</h1>
      <div class="sub">Samme 100vh-lås og flex-struktur som Bubble</div>
    </div>
  </div>

  <div class="picker">
    <button class="pbtn on" data-m="prod" onclick="pick('prod',this)">A · Som i dag</button>
    <button class="pbtn" data-m="vv" onclick="pick('vv',this)">B · visualViewport</button>
    <button class="pbtn" data-m="raf" onclick="pick('raf',this)">C · scroll i rAF</button>
    <button class="pbtn" data-m="anchor" onclick="pick('anchor',this)">D · flex-reverse</button>
    <button class="pbtn" data-m="nofocus" onclick="pick('nofocus',this)">E · blur+refocus</button>
    <button class="pbtn" data-m="lockscroll" onclick="pick('lockscroll',this)">F · lås vindues-scroll</button>
  </div>

  <div class="status">
    <span>fokus: <span class="v" id="s-f">—</span></span>
    <span>vv: <span class="v" id="s-vv">—</span></span>
    <span>tastatur: <span class="v" id="s-kb">—</span></span>
  </div>

  <div class="desc" id="desc"></div>

  <div class="messages" id="list"></div>

  <div class="composer" id="composer">
    <div class="crow">
      <input class="cinput" id="inp" placeholder="Skriv en besked…" enterkeyhint="send"
        autocomplete="off" autocorrect="on">
      <button class="sbtn" id="btn"
        ontouchstart="event.preventDefault()"
        ontouchend="event.preventDefault();doSend()"
        onclick="if(!('ontouchstart' in window))doSend()">→</button>
    </div>
  </div>

</div>
<div class="verdict" id="verdict"></div>

<script>
var MODE = 'prod';
var DESCS = {
  prod:   'Præcis som Bubble i dag: scrollTop = scrollHeight umiddelbart efter beskeden indsættes. Reproducér bug-en her først.',
  vv:     'Composeren følger tastaturets overkant via window.visualViewport (translateY). Rører ALDRIG html/body/dvh. Dette er sporet TECH-DEBT peger på.',
  raf:    'Samme scroll som i dag, men inde i requestAnimationFrame — efter browserens layout-pas, så scrollen ikke konkurrerer med tastaturet.',
  anchor: 'flex-direction:column-reverse: nyeste besked er altid nederst uden at nogen rører scrollTop. Ingen programmatisk scroll overhovedet.',
  nofocus:'Feltet blur-es FØR indsættelse og refokuseres bagefter. Sidste udvej hvis intet andet virker.',
  lockscroll:'iOS ruller HELE dokumentet op når tastaturet kommer — selv med overflow:hidden. Her tvinges window.scrollTo(0,0) løbende, og composeren følger tastaturet via visualViewport. Dette er den mest lovende kandidat.'
};

function pick(m, btn){
  MODE = m;
  document.querySelectorAll('.pbtn').forEach(function(b){ b.classList.toggle('on', b===btn); });
  document.getElementById('desc').textContent = DESCS[m];
  var list = document.getElementById('list');
  list.classList.toggle('rev', m === 'anchor');
  resetVV();
  if (_lockRaf) { cancelAnimationFrame(_lockRaf); _lockRaf = null; }
  if (m === 'lockscroll') lockScrollLoop();
  seed();
}

function seed(){
  var list = document.getElementById('list');
  list.innerHTML = '';
  for (var i=1;i<=12;i++){
    var d = document.createElement('div');
    d.className = 'msg' + (i%3===0 ? ' mine' : '');
    d.textContent = 'Tidligere besked ' + i + ' — fylder listen så der er noget at scrolle i.';
    if (MODE === 'anchor') list.insertBefore(d, list.firstChild);
    else list.appendChild(d);
  }
  if (MODE !== 'anchor') list.scrollTop = list.scrollHeight;
}

/* ── visualViewport: flyt KUN composeren ── */
function resetVV(){
  var c = document.getElementById('composer');
  c.style.transform = '';
}
var _lockRaf = null;
function lockScrollLoop(){
  if (MODE !== 'lockscroll') { _lockRaf = null; return; }
  if (window.scrollY !== 0) window.scrollTo(0, 0);
  _lockRaf = requestAnimationFrame(lockScrollLoop);
}
function vvHandler(){
  refreshBase();
  if (MODE === 'lockscroll'){
    var cc = document.getElementById('composer');
    var g = BASE_H - window.visualViewport.height;
    cc.style.transform = g > 80 ? 'translateY(-' + Math.round(g - (BASE_H - window.innerHeight)) + 'px)' : '';
    if (window.scrollY !== 0) window.scrollTo(0, 0);
    return;
  }
  if (MODE !== 'vv') { resetVV(); return; }
  var c = document.getElementById('composer');
  var gap = window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop;
  if (gap > 80){
    c.style.transform = 'translateY(-' + Math.round(gap) + 'px)';
  } else {
    c.style.transform = '';
  }
}
if (window.visualViewport){
  window.visualViewport.addEventListener('resize', vvHandler);
  window.visualViewport.addEventListener('scroll', vvHandler);
}

/* Baseline: højden UDEN tastatur, målt ved load og opdateret når tastaturet er nede.
   window.innerHeight kan ikke bruges — iOS ændrer den i låste layouts. */
var BASE_H = window.visualViewport ? window.visualViewport.height : window.innerHeight;
function kbUp(){
  if (!window.visualViewport) return null;
  return (BASE_H - window.visualViewport.height) > 80;
}
function refreshBase(){
  if (!window.visualViewport) return;
  if (document.activeElement !== document.getElementById('inp')) {
    BASE_H = Math.max(BASE_H, window.visualViewport.height);
  }
}

function status(){
  var a = document.activeElement, inp = document.getElementById('inp');
  var f = document.getElementById('s-f');
  f.textContent = (a===inp) ? 'JA' : 'nej';
  f.className = 'v ' + (a===inp ? 'good':'bad');
  if (window.visualViewport){
    var vv = window.visualViewport;
    document.getElementById('s-vv').textContent =
      Math.round(vv.height) + '/' + Math.round(BASE_H) + ' off' + Math.round(vv.offsetTop) +
      ' sc' + Math.round(window.scrollY);
    var k = document.getElementById('s-kb'), up = kbUp();
    k.textContent = up ? 'OPPE' : 'nede';
    k.className = 'v ' + (up ? 'good':'bad');
  } else {
    document.getElementById('s-vv').textContent = 'n/a';
    document.getElementById('s-kb').textContent = 'desktop';
  }
}
setInterval(status, 150);

function verdict(kind, msg){
  var v = document.getElementById('verdict');
  v.className = 'verdict show ' + kind;
  v.textContent = msg;
  clearTimeout(v._h);
  v._h = setTimeout(function(){ v.classList.remove('show'); }, 2600);
}

function net(){ return new Promise(function(r){ setTimeout(r, 220); }); }

async function doSend(){
  var inp = document.getElementById('inp');
  var list = document.getElementById('list');
  var btn = document.getElementById('btn');
  var text = inp.value.trim();
  if (!text){ verdict('wait','Skriv noget først'); return; }

  var kbBefore = kbUp();

  btn.classList.add('is-sending');

  if (MODE === 'nofocus') inp.blur();

  inp.value = '';
  await net();

  var d = document.createElement('div');
  d.className = 'msg mine';
  d.textContent = text;
  if (MODE === 'anchor') list.insertBefore(d, list.firstChild);
  else list.appendChild(d);

  if (MODE === 'prod' || MODE === 'vv' || MODE === 'nofocus' || MODE === 'lockscroll'){
    list.scrollTop = list.scrollHeight;
  } else if (MODE === 'raf'){
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){ list.scrollTop = list.scrollHeight; });
    });
  }

  if (MODE === 'nofocus') inp.focus({preventScroll:true});

  btn.classList.remove('is-sending');

  setTimeout(function(){
    var up = kbUp(), foc = document.activeElement === inp;
    var shifted = Math.round(window.scrollY) > 2 ||
      (window.visualViewport && Math.round(window.visualViewport.offsetTop) > 2);
    if (up === null){ verdict(foc?'ok':'bad', foc?'Fokus bevaret (desktop)':'Fokus tabt'); return; }
    if (!up) { verdict('bad','TASTATURET LUKKEDE'); return; }
    if (shifted) verdict('bad','Tastatur oppe MEN layout forskubbet (scroll ' + Math.round(window.scrollY) + ')');
    else if (!foc) verdict('wait','Tastatur oppe, fokus flyttet');
    else verdict('ok','TASTATUR OPPE + LAYOUT INTAKT');
  }, 550);
}

document.getElementById('inp').addEventListener('keydown', function(e){
  if (e.key === 'Enter'){ e.preventDefault(); doSend(); }
});

pick('prod', document.querySelector('.pbtn'));
status();
</script>
</body>
</html>
