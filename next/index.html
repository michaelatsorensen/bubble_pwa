<!DOCTYPE html>
<html lang="da"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="refresh" content="0;url=https://bubbleme.dk/">
<title>Bubble er flyttet</title>
<style>
  body{font-family:system-ui,-apple-system,sans-serif;background:#05080C;color:#EAF2FB;
    display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;
    text-align:center;padding:2rem;box-sizing:border-box}
  p{font-size:0.95rem;line-height:1.6;max-width:320px}
  a{color:#8FC6EC}
</style>
</head><body>
<div>
  <p>Bubble er flyttet. Du sendes videre&hellip;</p>
  <p><a href="https://bubbleme.dk/">Klik her hvis du ikke automatisk sendes videre</a></p>
</div>
<script>
// Ryd op efter den gamle installation (afregistrer SW + ryd caches) og send videre.
try {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(r){ r.unregister(); });
    });
  }
  if (window.caches && caches.keys) {
    caches.keys().then(function(keys){ keys.forEach(function(k){ caches.delete(k); }); });
  }
} catch(e) {}
location.replace('https://bubbleme.dk/');
</script>
</body></html>
