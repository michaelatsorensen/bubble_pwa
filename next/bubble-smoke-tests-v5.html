<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Smoke Tests v5.0</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Figtree',sans-serif;background:#F8F7FC;color:#1E1B2E;max-width:660px;margin:0 auto;padding:1rem}
  h1{font-size:1.4rem;font-weight:800;margin-bottom:0.1rem}
  .sub{font-size:0.72rem;color:#8B86A0;margin-bottom:1rem}
  .card{background:#fff;border:1px solid #E8E6F0;border-radius:14px;padding:1rem;margin-bottom:0.8rem}
  .card-title{font-size:0.82rem;font-weight:700;margin-bottom:0.5rem}
  .row{display:flex;gap:0.6rem}
  .row>*{flex:1;min-width:0}
  .field{margin-bottom:0.4rem}
  .field label{font-size:0.68rem;font-weight:600;color:#8B86A0;display:block;margin-bottom:1px}
  .field input{width:100%;padding:0.4rem 0.55rem;border:1.5px solid #E8E6F0;border-radius:8px;font-family:inherit;font-size:0.78rem}
  .field input:focus{outline:none;border-color:#7C5CFC}
  .btns{display:flex;gap:0.35rem;margin-bottom:0.8rem;flex-wrap:wrap}
  .b{padding:0.55rem 0.7rem;border:none;border-radius:10px;font-family:inherit;font-size:0.72rem;font-weight:700;cursor:pointer;color:#fff}
  .b:disabled{opacity:0.4;cursor:not-allowed}
  .b1{background:linear-gradient(135deg,#7C5CFC,#6366F1);font-size:0.8rem;padding:0.65rem 0.9rem}
  .b2{background:linear-gradient(135deg,#2ECFCF,#22B8CF)}
  .b3{background:linear-gradient(135deg,#F59E0B,#EAB308);color:#1E1B2E}
  .b4{background:linear-gradient(135deg,#D06070,#C0392B);font-size:0.68rem}
  .pbar{background:#E8E6F0;border-radius:99px;height:6px;margin-bottom:0.25rem;overflow:hidden}
  .pfill{height:100%;border-radius:99px;transition:width 0.3s}
  .plbl{font-size:0.68rem;color:#8B86A0;text-align:right;font-weight:600}
  .meta{display:grid;grid-template-columns:110px 1fr;gap:0.15rem 0.6rem;font-size:0.7rem;margin-top:0.5rem}
  .meta div:nth-child(odd){color:#8B86A0}
  .mono{font-family:'SF Mono','Fira Code',monospace;font-size:0.66rem}
  .pill{display:inline-flex;padding:0.15rem 0.5rem;border-radius:99px;background:rgba(124,92,252,0.08);color:#534AB7;font-size:0.64rem;font-weight:700}
  #out{background:#fff;border:1px solid #E8E6F0;border-radius:14px;padding:0.5rem;display:none}
  .sh{font-size:0.74rem;font-weight:700;color:#7C5CFC;padding:0.55rem 0 0.2rem;border-top:2px solid #F0EEF5;margin-top:0.3rem}
  .sh:first-child{border-top:none;margin-top:0}
  .r{display:flex;align-items:flex-start;gap:0.45rem;padding:0.4rem;border-bottom:1px solid #F8F7FC}
  .r:last-child{border-bottom:none}
  .ri{width:19px;height:19px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:800;flex-shrink:0;margin-top:1px}
  .r.p .ri{background:rgba(26,158,142,0.12);color:#1A9E8E}
  .r.f .ri{background:rgba(208,96,112,0.12);color:#D06070}
  .r.w .ri{background:rgba(245,158,11,0.12);color:#D97706}
  .rb{flex:1;min-width:0}
  .rt{font-size:0.76rem;font-weight:600}
  .rd{font-size:0.64rem;color:#8B86A0;margin-top:1px;word-break:break-all}
  .f .rt{color:#D06070}
  .w .rt{color:#D97706}
  .sum{text-align:center;padding:0.8rem 0;font-size:0.85rem;font-weight:700}
  @media(max-width:500px){.row{flex-direction:column}}
</style>
</head>
<body>
<h1>🧪 Bubble Smoke Tests v5.0</h1>
<div class="sub">RUN_ID · ledger · egne fixtures · realtime · soft-fail · force cleanup · v8.17 schema · client-side privacy</div>

<div class="card">
  <div class="row">
    <div><div class="card-title">Test-bruger A</div>
      <div class="field"><label>Email</label><input id="ea" value="test@bubbleme.dk"/></div>
      <div class="field"><label>Password</label><input id="pa" type="password"/></div>
    </div>
    <div><div class="card-title">Test-bruger B</div>
      <div class="field"><label>Email</label><input id="eb"/></div>
      <div class="field"><label>Password</label><input id="pb" type="password"/></div>
    </div>
  </div>
</div>

<div class="btns">
  <button class="b b1" id="btnRun" onclick="go('all')">Kør alle tests</button>
  <button class="b b2" onclick="go('security')">Sikkerhed</button>
  <button class="b b2" onclick="go('stability')">Stabilitet</button>
  <button class="b b2" onclick="go('flows')">Bubble flows</button>
  <button class="b b2" onclick="go('visibility')">Visibility</button>
  <button class="b b3" onclick="go('realtime')">Realtime</button>
  <button class="b b4" onclick="forceCleanup()">Opryd run-id</button>
</div>

<div class="pbar"><div class="pfill" id="pf" style="width:0"></div></div>
<div class="plbl" id="pl"></div>
<div class="meta" id="metaPanel">
  <div>Run ID</div><div id="mRun" class="mono">—</div>
  <div>Mode</div><div id="mMode">—</div>
  <div>Fixtures</div><div id="mFix">—</div>
  <div>Subscriptions</div><div id="mSub">—</div>
  <div>Tid</div><div id="mTime">—</div>
</div>

<div id="out"></div>

<script>
var SB_URL='https://api.bubbleme.dk';
var SB_KEY='sb_publishable_y6BftA4RQw91dLHPXIncag_oGomBk-A';

// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
var RUN_ID,sbA,sbB,userA,userB,profA,profB;
var _cc=0,_t0=0;
var res=[],total=0,done=0,pass=0,fail=0,warns=0;

// ══════════════════════════════════════
//  CLEANUP LEDGER
// ══════════════════════════════════════
var L={
  messages:[],bubbleMessages:[],savedContacts:[],profileViews:[],
  memberships:[],bubbles:[],profileRestores:[],subscriptions:[],
  invitations:[],posts:[],reactions:[],
  reset:function(){this.messages=[];this.bubbleMessages=[];this.savedContacts=[];this.profileViews=[];this.memberships=[];this.bubbles=[];this.profileRestores=[];this.subscriptions=[];this.invitations=[];this.posts=[];this.reactions=[]}
};
var FIX={pub:null,priv:null,evt:null,hid:null}; // fixture bubble IDs

function sbFor(w){return w==='B'?sbB:sbA}

// ══════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════
function mkClient(){_cc++;return supabase.createClient(SB_URL,SB_KEY,{auth:{storageKey:'sb-v4-'+_cc,persistSession:false}})}
function tag(s){return'['+RUN_ID+'] '+s}
function hasTag(s){return s&&s.indexOf(RUN_ID)>=0}

function sec(t){res.push({T:'s',t:t});render()}
function ok(n,p,d){done++;if(p)pass++;else fail++;res.push({T:'r',n:n,ok:p,d:d||''});render()}
function soft(n,p,d){done++;if(p)pass++;else warns++;res.push({T:'w',n:n,ok:p,d:d||''});render()}

function render(){
  var el=document.getElementById('out');el.style.display='block';
  var pct=total>0?Math.round(done/total*100):0;
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pf').style.background=fail>0?'#D06070':'#1A9E8E';
  document.getElementById('pl').textContent=done+'/'+total+' — '+pass+' ✓  '+fail+' ✗  '+warns+' ⚠';
  document.getElementById('mRun').textContent=RUN_ID||'—';
  document.getElementById('mMode').textContent=arguments[0]||document.getElementById('mMode').textContent;
  document.getElementById('mFix').innerHTML=[FIX.pub,FIX.priv,FIX.evt].filter(Boolean).length?'<span class="pill">'+[FIX.pub,FIX.priv,FIX.evt].filter(Boolean).length+' oprettet</span>':'—';
  document.getElementById('mSub').innerHTML=L.subscriptions.length?'<span class="pill">'+L.subscriptions.length+' aktive</span>':'0';
  document.getElementById('mTime').textContent=((Date.now()-_t0)/1000).toFixed(1)+'s';
  el.innerHTML=res.map(function(r){
    if(r.T==='s')return'<div class="sh">'+r.t+'</div>';
    var c=r.T==='w'?(r.ok?'p':'w'):(r.ok?'p':'f');
    var i=r.T==='w'&&!r.ok?'⚠':(r.ok?'✓':'✗');
    return'<div class="r '+c+'"><div class="ri">'+i+'</div><div class="rb"><div class="rt">'+r.n+'</div>'+(r.d?'<div class="rd">'+r.d+'</div>':'')+'</div></div>';
  }).join('')+(done>=total&&total>0?'<div class="sum" style="color:'+(fail===0?'#1A9E8E':'#D06070')+'">'+(fail===0?'🎉 Alle '+total+' tests bestod'+(warns?' ('+warns+' warnings)':'')+'!':'⚠️ '+fail+' fejlede')+'</div>':'');
}

function busy(on){document.querySelectorAll('.b').forEach(function(b){b.disabled=!!on})}

// ══════════════════════════════════════
//  AUTH + SNAPSHOTS
// ══════════════════════════════════════
async function auth(){
  sec('🔑 Auth');_cc=0;sbA=mkClient();sbB=mkClient();
  var {data:dA,error:eA}=await sbA.auth.signInWithPassword({email:document.getElementById('ea').value.trim(),password:document.getElementById('pa').value});
  userA=dA?.user;ok('Login A',!!userA,eA?eA.message:'uid: '+userA?.id?.slice(0,8));
  var {data:dB,error:eB}=await sbB.auth.signInWithPassword({email:document.getElementById('eb').value.trim(),password:document.getElementById('pb').value});
  userB=dB?.user;ok('Login B',!!userB,eB?eB.message:'uid: '+userB?.id?.slice(0,8));
  if(!userA||!userB){ok('STOP',false,'Begge brugere kræves');return false}
  var {data:pA}=await sbA.from('profiles').select('*').eq('id',userA.id).single();
  var {data:pB}=await sbB.from('profiles').select('*').eq('id',userB.id).single();
  profA=pA;profB=pB;
  // Snapshot for restore
  if(pA) L.profileRestores.push({userId:userA.id,fields:{name:pA.name,title:pA.title,workplace:pA.workplace,bio:pA.bio},client:'A'});
  if(pB) L.profileRestores.push({userId:userB.id,fields:{name:pB.name,title:pB.title,workplace:pB.workplace,bio:pB.bio},client:'B'});
  return true;
}

// ══════════════════════════════════════
//  FIXTURES — own test bubbles
// ══════════════════════════════════════
async function setupFixtures(){
  sec('🏗️ Fixtures');
  var types=[
    {key:'pub',vis:'public',type:'network',label:'Public bubble'},
    {key:'priv',vis:'private',type:'network',label:'Private bubble'},
    {key:'evt',vis:'public',type:'event',label:'Event bubble'},
    {key:'hid',vis:'hidden',type:'network',label:'Hidden bubble'}
  ];
  for(var i=0;i<types.length;i++){
    var t=types[i];
    var ins={name:tag(t.label),type:t.type,description:tag('fixture'),created_by:userA.id,visibility:t.vis,location:'Smoke Lab'};
    if(t.type==='event') ins.event_date=new Date(Date.now()+86400000).toISOString();
    var {data:b,error:e}=await sbA.from('bubbles').insert(ins).select().single();
    if(b){FIX[t.key]=b.id;L.bubbles.push({id:b.id,client:'A'})}
    ok(t.label+' oprettet',!!b,e?e.message:'id: '+(b?.id?.slice(0,8)||''));
  }
}

// ══════════════════════════════════════
//  SECURITY TESTS
// ══════════════════════════════════════
async function testSecurity(){
  sec('🔒 Privilege escalation');
  var origRole=profA?.role||null;
  await sbA.from('profiles').update({role:'admin'}).eq('id',userA.id);
  var {data:r1}=await sbA.from('profiles').select('role').eq('id',userA.id).single();
  ok('Role self-escalation blokeret',r1?.role===origRole||r1?.role!=='admin','role: '+(r1?.role||'null'));

  var origBan=profA?.banned||false;
  await sbA.from('profiles').update({banned:true}).eq('id',userA.id);
  var {data:r2}=await sbA.from('profiles').select('banned').eq('id',userA.id).single();
  ok('Banned self-set blokeret',r2?.banned===origBan,'banned: '+r2?.banned);
  if(r2?.banned!==origBan) await sbA.from('profiles').update({banned:origBan}).eq('id',userA.id);

  sec('🔒 Cross-user isolation');
  await sbA.from('profiles').update({banned:true}).eq('id',userB.id);
  var {data:r3}=await sbB.from('profiles').select('banned').eq('id',userB.id).single();
  ok('A kan ikke banne B',!r3?.banned,'B banned: '+r3?.banned);
  if(r3?.banned) await sbB.from('profiles').update({banned:false}).eq('id',userB.id);

  await sbA.from('profiles').update({name:tag('HACKED')}).eq('id',userB.id);
  var {data:r4}=await sbB.from('profiles').select('name').eq('id',userB.id).single();
  ok('A kan ikke ændre B\'s navn',!hasTag(r4?.name),'name: '+r4?.name);

  var {data:dmL}=await sbA.from('messages').select('id').neq('sender_id',userA.id).neq('receiver_id',userA.id).limit(1);
  ok('DM isolation',!dmL||dmL.length===0,'rows: '+(dmL?.length||0));
  var {data:scL}=await sbA.from('saved_contacts').select('id').neq('user_id',userA.id).limit(1);
  ok('Saved contacts isolation',!scL||scL.length===0,'rows: '+(scL?.length||0));
  var {data:puL}=await sbA.from('push_subscriptions').select('id').neq('user_id',userA.id).limit(1);
  ok('Push isolation',!puL||puL.length===0,'rows: '+(puL?.length||0));
  var {data:blL}=await sbA.from('blocked_users').select('id').neq('user_id',userA.id).limit(1);
  ok('Blocked users isolation',!blL||blL.length===0,'rows: '+(blL?.length||0));
  var {data:rpL}=await sbA.from('reports').select('id').neq('reporter_id',userA.id).limit(1);
  ok('Reports isolation',!rpL||rpL.length===0,'rows: '+(rpL?.length||0));

  // Error log
  var {error:elI}=await sbA.from('error_log').insert({user_id:userA.id,context:tag('smoke'),message:tag('test')});
  ok('Error log insert',!elI,elI?elI.message:'OK');
  var {data:elR}=await sbA.from('error_log').select('id').limit(1);
  ok('Error log read blokeret',!elR||elR.length===0,'rows: '+(elR?.length||0));

  sec('🔒 XSS & Injection');
  var xss='<script>alert("xss")<\/script>';
  var {data:xm}=await sbA.from('messages').insert({sender_id:userA.id,receiver_id:userB.id,content:tag(xss)}).select().single();
  ok('XSS i DM gemt som tekst',xm?.content?.includes(xss),'OK');
  if(xm) L.messages.push({id:xm.id,client:'A'});

  var sql="'; DROP TABLE profiles; --";
  var {data:sm}=await sbA.from('messages').insert({sender_id:userA.id,receiver_id:userB.id,content:tag(sql)}).select().single();
  ok('SQL injection — ingen crash',!!sm,'OK');
  if(sm) L.messages.push({id:sm.id,client:'A'});

  var origName=profA?.name||'Test';
  await sbA.from('profiles').update({name:tag(xss)}).eq('id',userA.id);
  var {data:xp}=await sbA.from('profiles').select('name').eq('id',userA.id).single();
  ok('XSS i profilnavn gemt som tekst',xp?.name?.includes(xss),'OK');

  sec('🔒 Bubble ownership');
  if(FIX.pub){
    await sbB.from('bubbles').delete().eq('id',FIX.pub);
    var {data:bs}=await sbA.from('bubbles').select('id').eq('id',FIX.pub).single();
    ok('Non-owner kan ikke slette bubble',!!bs,bs?'Stadig der':'⚠️ SLETTET');

    await sbB.from('bubbles').update({name:tag('STOLEN')}).eq('id',FIX.pub);
    var {data:bn}=await sbA.from('bubbles').select('name').eq('id',FIX.pub).single();
    ok('Non-owner kan ikke ændre bubble',!hasTag(bn?.name)||bn?.name?.includes('Public'),'name: '+bn?.name);
  }else{ok('Bubble ownership',true,'Skip: no fixture')}

  // Cross-user DM delete
  sec('🔒 Cross-user DM');
  var {data:cdm}=await sbA.from('messages').insert({sender_id:userA.id,receiver_id:userB.id,content:tag('nodelete')}).select().single();
  if(cdm){
    L.messages.push({id:cdm.id,client:'A'});
    await sbB.from('messages').delete().eq('id',cdm.id);
    var {data:cs}=await sbA.from('messages').select('id').eq('id',cdm.id).single();
    ok('B kan ikke slette A\'s DM',!!cs,cs?'Stadig der':'⚠️ SLETTET');
  }else{ok('B kan ikke slette A\'s DM',false,'Insert fejlede')}

  // Member role escalation
  if(FIX.pub){
    await sbB.from('bubble_members').delete().eq('bubble_id',FIX.pub).eq('user_id',userB.id);
    var {data:jm}=await sbB.from('bubble_members').insert({bubble_id:FIX.pub,user_id:userB.id}).select().single();
    if(jm){
      L.memberships.push({bubbleId:FIX.pub,userId:userB.id,client:'B'});
      await sbB.from('bubble_members').update({role:'owner'}).eq('bubble_id',FIX.pub).eq('user_id',userB.id);
      var {data:mr}=await sbB.from('bubble_members').select('role').eq('bubble_id',FIX.pub).eq('user_id',userB.id).single();
      ok('Member role escalation blokeret',mr?.role!=='owner','role: '+(mr?.role||'null'));
    }else{ok('Member role escalation',false,'Join fejlede')}
  }else{ok('Member role escalation',true,'Skip: no fixture')}
}

// ══════════════════════════════════════
//  STABILITY TESTS
// ══════════════════════════════════════
async function testStability(){
  sec('⚡ DM — Rapid send');
  var ids=[];var allOk=true;
  for(var i=0;i<5;i++){
    var {data:m,error:e}=await sbA.from('messages').insert({sender_id:userA.id,receiver_id:userB.id,content:tag('rapid_'+i)}).select().single();
    if(!m||e)allOk=false;
    if(m){ids.push(m.id);L.messages.push({id:m.id,client:'A'})}
  }
  ok('5 rapid DMs',allOk&&ids.length===5,ids.length+'/5');

  var {data:ord}=await sbB.from('messages').select('id,content,created_at').in('id',ids).order('created_at',{ascending:true});
  var orderOk=ord&&ord.length===5;
  if(orderOk){for(var j=0;j<ord.length;j++){if(!ord[j].content.includes('rapid_'+j)){orderOk=false;break}}}
  ok('DM rækkefølge korrekt',orderOk,ord?ord.map(function(m){return m.content.match(/rapid_(\d)/)?.[1]}).join(','):'Fejl');

  var big=tag('X'.repeat(4900));
  var {data:bm,error:be}=await sbA.from('messages').insert({sender_id:userA.id,receiver_id:userB.id,content:big}).select().single();
  ok('Stor besked (5000 tegn)',!!bm,bm?bm.content.length+' tegn':be?.message);
  if(bm) L.messages.push({id:bm.id,client:'A'});

  var {data:em,error:ee}=await sbA.from('messages').insert({sender_id:userA.id,receiver_id:userB.id,content:''}).select().single();
  ok('Tom besked håndteres',!!em||!!ee,em?'Tilladt':'Blokeret');
  if(em) L.messages.push({id:em.id,client:'A'});

  sec('⚡ Unread lifecycle');
  var testIds=L.messages.filter(function(m){return m.client==='A'}).map(function(m){return m.id});
  var {count:pre}=await sbB.from('messages').select('*',{count:'exact',head:true}).eq('receiver_id',userB.id).is('read_at',null);
  ok('Unread > 0',pre>0,'unread: '+pre);
  await sbB.from('messages').update({read_at:new Date().toISOString()}).in('id',testIds).eq('receiver_id',userB.id);
  var {count:post}=await sbB.from('messages').select('*',{count:'exact',head:true}).eq('receiver_id',userB.id).is('read_at',null).in('id',testIds);
  ok('Mark-as-read nulstiller',post===0,'unread: '+post);

  sec('⚡ Saved contacts');
  await sbA.from('saved_contacts').delete().eq('user_id',userA.id).eq('contact_id',userB.id);
  var {data:sc}=await sbA.from('saved_contacts').insert({user_id:userA.id,contact_id:userB.id}).select().single();
  ok('Gem kontakt',!!sc,'OK');
  if(sc) L.savedContacts.push({id:sc.id,client:'A'});
  var {error:dupE}=await sbA.from('saved_contacts').insert({user_id:userA.id,contact_id:userB.id});
  ok('Duplikat blokeret',!!dupE,'Korrekt');

  sec('⚡ Profile views');
  var {error:pvE}=await sbA.from('profile_views').insert({viewer_id:userA.id,viewed_id:userB.id});
  ok('Profile view registreret',!pvE,pvE?pvE.message:'OK');
  if(!pvE){var {data:pvRow}=await sbB.from('profile_views').select('id').eq('viewed_id',userB.id).eq('viewer_id',userA.id).order('created_at',{ascending:false}).limit(1).single();if(pvRow) L.profileViews.push({id:pvRow.id,client:'B'})}
  var {data:pvR}=await sbB.from('profile_views').select('id').eq('viewed_id',userB.id).eq('viewer_id',userA.id).limit(1);
  ok('B kan se views',pvR&&pvR.length>0,'views: '+(pvR?.length||0));

  sec('⚡ Profil update & restore');
  var testTitle=tag('SmokeTitle');
  await sbA.from('profiles').update({title:testTitle}).eq('id',userA.id);
  var {data:pu}=await sbA.from('profiles').select('title').eq('id',userA.id).single();
  ok('Profil update persisterer',pu?.title===testTitle,'OK');
}

// ══════════════════════════════════════
//  BUBBLE FLOW TESTS
// ══════════════════════════════════════
async function testFlows(){
  sec('🫧 Bubble lifecycle');
  if(!FIX.pub){ok('Bubble flows',false,'No fixture');return}

  await sbB.from('bubble_members').delete().eq('bubble_id',FIX.pub).eq('user_id',userB.id);

// ══════════════════════════════════════
async function testRealtime(){
  sec('📡 Realtime — DM');

  var dmResult=await new Promise(function(resolve){
    var isDone=false;
    var timer=setTimeout(function(){if(!isDone){isDone=true;try{ch.unsubscribe()}catch(e){}resolve({ok:false,reason:'timeout (3.5s)'})}},3500);
    var ch=sbB.channel('smoke-dm-'+RUN_ID)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'receiver_id=eq.'+userB.id},function(payload){
        if(payload?.new?.content&&payload.new.content.indexOf(RUN_ID)>=0&&!isDone){
          isDone=true;clearTimeout(timer);try{ch.unsubscribe()}catch(e){}resolve({ok:true,reason:'event modtaget'});
        }
      });
    L.subscriptions.push(ch);render();
    ch.subscribe(function(status){
      if(status==='SUBSCRIBED'){
        sbA.from('messages').insert({sender_id:userA.id,receiver_id:userB.id,content:tag('rt_dm')}).select().single().then(function(r){
          if(r.data) L.messages.push({id:r.data.id,client:'A'});
          if(r.error&&!isDone){isDone=true;clearTimeout(timer);resolve({ok:false,reason:r.error.message})}
        });
      }
      if((status==='CHANNEL_ERROR'||status==='TIMED_OUT')&&!isDone){isDone=true;clearTimeout(timer);resolve({ok:false,reason:status})}
    });
  });
  soft('DM realtime event modtaget',dmResult.ok,dmResult.reason);

  sec('📡 Realtime — Bubble chat');
  if(!FIX.pub){soft('Bubble chat realtime',false,'No fixture');return}

  // Ensure both are members
  await sbA.from('bubble_members').upsert({bubble_id:FIX.pub,user_id:userA.id});
  await sbB.from('bubble_members').upsert({bubble_id:FIX.pub,user_id:userB.id});

  var bcResult=await new Promise(function(resolve){
    var isDone=false;
    var timer=setTimeout(function(){if(!isDone){isDone=true;try{ch.unsubscribe()}catch(e){}resolve({ok:false,reason:'timeout (3.5s)'})}},3500);
    var ch=sbB.channel('smoke-bc-'+RUN_ID)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'bubble_messages',filter:'bubble_id=eq.'+FIX.pub},function(payload){
        if(payload?.new?.content&&payload.new.content.indexOf(RUN_ID)>=0&&!isDone){
          isDone=true;clearTimeout(timer);try{ch.unsubscribe()}catch(e){}resolve({ok:true,reason:'event modtaget'});
        }
      });
    L.subscriptions.push(ch);render();
    ch.subscribe(function(status){
      if(status==='SUBSCRIBED'){
        sbA.from('bubble_messages').insert({bubble_id:FIX.pub,user_id:userA.id,content:tag('rt_bc')}).select().single().then(function(r){
          if(r.data) L.bubbleMessages.push({id:r.data.id,client:'A'});
          if(r.error&&!isDone){isDone=true;clearTimeout(timer);resolve({ok:false,reason:r.error.message})}
        });
      }
      if((status==='CHANNEL_ERROR'||status==='TIMED_OUT')&&!isDone){isDone=true;clearTimeout(timer);resolve({ok:false,reason:status})}
    });
  });
  soft('Bubble chat realtime event modtaget',bcResult.ok,bcResult.reason);

  ok('Bubble message readback af medlem',!!bcRead&&bcRead.length>0,'rows: '+(bcRead?.length||0));

//  CLEANUP + VERIFICATION
// ══════════════════════════════════════
async function cleanupAll(){
  sec('🧹 Cleanup');
  var errs=0;

  // Teardown realtime subscriptions
  for(var i=0;i<L.subscriptions.length;i++){try{L.subscriptions[i].unsubscribe()}catch(e){}}
  L.subscriptions=[];render();
  ok('Subscriptions lukket',true,'OK');

  // Messages (use sender's client — RLS requires sender_id = auth.uid())
  for(var i=0;i<L.messages.length;i++){var m=L.messages[i];var {error}=await sbFor(m.client).from('messages').delete().eq('id',m.id);if(error)errs++}
  ok('DMs slettet ('+L.messages.length+')',errs===0,errs?errs+' fejl':'OK');

  // Bubble messages
  var bmerrs=0;
  for(var i=0;i<L.bubbleMessages.length;i++){var m=L.bubbleMessages[i];var {error}=await sbFor(m.client).from('bubble_messages').delete().eq('id',m.id);if(error)bmerrs++}
  ok('Bubble msgs slettet ('+L.bubbleMessages.length+')',bmerrs===0,bmerrs?bmerrs+' fejl':'OK');

  // Saved contacts
  for(var i=0;i<L.savedContacts.length;i++){var c=L.savedContacts[i];await sbFor(c.client).from('saved_contacts').delete().eq('id',c.id)}
  ok('Saved contacts ('+L.savedContacts.length+')',true,'OK');

  // Profile views (delete from B since B has viewed_id = self)
  for(var i=0;i<L.profileViews.length;i++){var v=L.profileViews[i];await sbFor(v.client).from('profile_views').delete().eq('id',v.id)}
  ok('Profile views ('+L.profileViews.length+')',true,'OK');

  // Memberships (before bubbles)
  for(var i=0;i<L.memberships.length;i++){var mem=L.memberships[i];await sbFor(mem.client).from('bubble_members').delete().eq('bubble_id',mem.bubbleId).eq('user_id',mem.userId)}
  ok('Memberships ('+L.memberships.length+')',true,'OK');

  // Fixture bubbles (clean children first)
  var bubErrs=0;
  for(var i=0;i<L.bubbles.length;i++){
    var b=L.bubbles[i];
    await sbFor(b.client).from('bubble_members').delete().eq('bubble_id',b.id);
    await sbFor(b.client).from('bubble_messages').delete().eq('bubble_id',b.id);
    var {error}=await sbFor(b.client).from('bubbles').delete().eq('id',b.id);
    if(error) bubErrs++;
  }
  ok('Bubbles slettet ('+L.bubbles.length+')',bubErrs===0,bubErrs?bubErrs+' fejl':'OK');

  // Profile restores
  for(var i=0;i<L.profileRestores.length;i++){
    var r=L.profileRestores[i];
    await sbFor(r.client).from('profiles').update(r.fields).eq('id',r.userId);
  }
  ok('Profiler restored ('+L.profileRestores.length+')',true,'OK');

  // Reactions
  var reactErrs=0;
  for(var i=0;i<L.reactions.length;i++){var rx=L.reactions[i];var {error}=await sbFor(rx.client).from(rx.table).delete().eq('id',rx.id);if(error)reactErrs++}
  if(L.reactions.length) ok('Reactions slettet ('+L.reactions.length+')',reactErrs===0,reactErrs?reactErrs+' fejl':'OK');

  // Posts
  var postErrs=0;
  for(var i=0;i<L.posts.length;i++){var p=L.posts[i];var {error}=await sbFor(p.client).from('bubble_posts').delete().eq('id',p.id);if(error)postErrs++}
  if(L.posts.length) ok('Posts slettet ('+L.posts.length+')',postErrs===0,postErrs?postErrs+' fejl':'OK');

  // Invitations
  var invErrs=0;
  for(var i=0;i<L.invitations.length;i++){var inv=L.invitations[i];var {error}=await sbFor(inv.client).from('bubble_invitations').delete().eq('id',inv.id);if(error)invErrs++}
  if(L.invitations.length) ok('Invitations slettet ('+L.invitations.length+')',invErrs===0,invErrs?invErrs+' fejl':'OK');

  // Error log (best effort)
  await sbA.from('error_log').delete().eq('user_id',userA.id).ilike('context','%'+RUN_ID+'%');
  ok('Error logs opryddet',true,'Best effort');

  // Fallback: sweep by RUN_ID
  await sbA.from('messages').delete().ilike('content','%'+RUN_ID+'%');
  await sbA.from('bubble_messages').delete().ilike('content','%'+RUN_ID+'%');
}

async function verifyCleanup(){
  sec('✅ Cleanup-verifikation');

  var {data:m1}=await sbA.from('messages').select('id').ilike('content','%'+RUN_ID+'%').limit(1);
  ok('Ingen test-DMs',!m1||m1.length===0,m1?.length?'⚠️ '+m1.length+' fundet':'Rent');

  var {data:m2}=await sbA.from('bubble_messages').select('id').ilike('content','%'+RUN_ID+'%').limit(1);
  ok('Ingen test-bubble msgs',!m2||m2.length===0,m2?.length?'⚠️ '+m2.length+' fundet':'Rent');

  var {data:m3}=await sbA.from('bubbles').select('id').ilike('name','%'+RUN_ID+'%').limit(1);
  ok('Ingen test-bubbles',!m3||m3.length===0,m3?.length?'⚠️ '+m3.length+' fundet':'Rent');

  var fixIds=[FIX.pub,FIX.priv,FIX.evt,FIX.hid].filter(Boolean);
  if(fixIds.length&&userB){
    var {data:m4}=await sbB.from('bubble_members').select('id').in('bubble_id',fixIds).eq('user_id',userB.id).limit(1);
    ok('Ingen fixture memberships',!m4||m4.length===0,m4?.length?'⚠️ fundet':'Rent');
  }else{ok('Ingen fixture memberships',true,'Skip')}

  var {data:pA}=await sbA.from('profiles').select('name,title').eq('id',userA.id).single();
  ok('Profil A restored',!hasTag(pA?.name||'')&&!hasTag(pA?.title||''),'name: '+pA?.name);

  var {data:pB}=await sbB.from('profiles').select('name,title').eq('id',userB.id).single();
  ok('Profil B uændret',!hasTag(pB?.name||''),'name: '+pB?.name);
}

// ══════════════════════════════════════
//  FORCE CLEANUP
// ══════════════════════════════════════
function forceCleanup(){
  var id=prompt('Indtast run-id der skal opryddes:');
  if(!id) return;
  RUN_ID=id.trim();
  L.reset();FIX={pub:null,priv:null,evt:null,hid:null};
  res=[];done=0;pass=0;fail=0;warns=0;total=999;_t0=Date.now();
  busy(true);
  (async function(){
    try{
      var ok=await auth();
      if(!ok) return;
      // Sweep everything with that run-id
      await sbA.from('messages').delete().ilike('content','%'+RUN_ID+'%');
      await sbA.from('bubble_messages').delete().ilike('content','%'+RUN_ID+'%');
      var {data:stale}=await sbA.from('bubbles').select('id').ilike('name','%'+RUN_ID+'%');
      if(stale){for(var i=0;i<stale.length;i++){
        await sbA.from('bubble_members').delete().eq('bubble_id',stale[i].id);
        await sbA.from('bubble_messages').delete().eq('bubble_id',stale[i].id);
        await sbA.from('bubbles').delete().eq('id',stale[i].id);
      }}
      sec('🧹 Force cleanup');
      ok('Sweep for '+RUN_ID,true,'Done');
      await verifyCleanup();
    }catch(e){ok('Force cleanup fejl',false,e.message)}
    finally{total=done;render();busy(false)}
  })();
}

// ══════════════════════════════════════
//  RUNNER
// ══════════════════════════════════════
async function go(mode){
  busy(true);
  RUN_ID='v5_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
  L.reset();FIX={pub:null,priv:null,evt:null,hid:null};
  res=[];done=0;pass=0;fail=0;warns=0;_t0=Date.now();
  total=999;render();
  document.getElementById('mMode').textContent=mode;

  try{
    var authOk=await auth();
    if(!authOk){total=done;render();busy(false);return}
    await setupFixtures();
    if(mode==='all'||mode==='security') await testSecurity();
    if(mode==='all'||mode==='stability') await testStability();
    if(mode==='all'||mode==='flows') await testFlows();
    if(mode==='all'||mode==='visibility') await testVisibility();
    if(mode==='all'||mode==='visibility') await testInvitations();
    if(mode==='all'||mode==='stability') await testBubbleMessages();
    if(mode==='all'||mode==='stability') await testCheckinIdempotency();
    if(mode==='all'||mode==='stability') await testErrorLog();
    if(mode==='all'||mode==='stability') await testBubblePosts();
    if(mode==='all'||mode==='stability') await testV817Schema();
    if(mode==='all'||mode==='realtime') await testRealtime();
  }catch(e){
    ok('Fatal fejl',false,e.message);
  }finally{
    await cleanupAll();
    await verifyCleanup();
    total=done;render();busy(false);
  }
}
